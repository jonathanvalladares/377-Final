<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CyberFeed - Cybersecurity News Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/dayjs.min.js"></script>
</head>
<body>

  <nav>
    <a href="/" class="nav-logo">&#x1F6E1; CyberFeed</a>
    <a href="/" class="active">Home</a>
    <a href="/about">About</a>
    <a href="/saved">Saved Articles</a>
  </nav>

  <div class="page-header">
    <h1>Cybersecurity News & Threat Feed Dashboard</h1>
    <p>Stay up to date with the latest cybersecurity threats, breaches, and news all in one place.</p>
  </div>

  <div class="container">

    <div class="search-section">
      <input type="text" id="searchInput" placeholder="Search cybersecurity topics..." />
      <button class="btn btn-primary" onclick="searchNews()">Search</button>
      <button class="btn btn-secondary" onclick="loadNews('cybersecurity')">Reset</button>
    </div>

    <div class="category-filters">
      <button class="filter-btn active" onclick="filterCategory('cybersecurity', this)">All</button>
      <button class="filter-btn" onclick="filterCategory('ransomware', this)">Ransomware</button>
      <button class="filter-btn" onclick="filterCategory('phishing', this)">Phishing</button>
      <button class="filter-btn" onclick="filterCategory('data breach', this)">Data Breaches</button>
      <button class="filter-btn" onclick="filterCategory('malware', this)">Malware</button>
      <button class="filter-btn" onclick="filterCategory('hacking', this)">Hacking</button>
    </div>

    <div class="chart-section">
      <h2>Threat Category Breakdown (Current Results)</h2>
      <div class="chart-wrapper">
        <canvas id="threatChart"></canvas>
      </div>
    </div>

    <div id="articlesContainer">
      <p class="status-msg">Loading news...</p>
    </div>

  </div>

  <footer>
    <p>CyberFeed &mdash; INST 377 Final Project &mdash; Powered by GNews API</p>
  </footer>

  <script src="index.js"></script>

</body>
</html>
