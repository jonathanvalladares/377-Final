<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saved Articles - CyberFeed</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/dayjs.min.js"></script>
</head>
<body>

  <nav>
    <a href="/" class="nav-logo">&#x1F6E1; CyberFeed</a>
    <a href="/">Home</a>
    <a href="/about">About</a>
    <a href="/saved" class="active">Saved Articles</a>
  </nav>

  <div class="page-header">
    <h1>Saved Articles</h1>
    <p>All the articles you have bookmarked for later reading.</p>
  </div>

  <div class="container">

    <div class="saved-controls">
      <input type="text" id="filterInput" placeholder="Filter saved articles by keyword..." oninput="filterSaved()" />
      <button class="btn btn-secondary" onclick="clearFilter()">Clear</button>
    </div>

    <div id="savedContainer">
      <p class="status-msg">Loading saved articles...</p>
    </div>

  </div>

  <footer>
    <p>CyberFeed &mdash; INST 377 Final Project &mdash;</p>
  </footer>

  <script src="saved.js"></script>

</body>
</html>
